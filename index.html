<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¨Nordic Prognose</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { 
            --bg: #0f0f12; --card: #18181b; --border: #27272a; 
            --accent: #3b82f6; --text: #f4f4f5; --text-dim: #a1a1aa; --danger: #ef4444;
            --unsure: #423b1c; --th-year: #09090b; --th-month: #111113; --th-week: #18181b;
            --tr-sum: #1c1c21; --tr-proj: #121215; --tr-add: #111111; --input-bg: #27272a;
        }
        
        :root.light-mode {
            --bg: #f3f4f6; --card: #ffffff; --border: #d1d5db; 
            --accent: #2563eb; --text: #1f2937; --text-dim: #6b7280; --danger: #dc2626;
            --unsure: #fef08a; --th-year: #e5e7eb; --th-month: #f9fafb; --th-week: #ffffff;
            --tr-sum: #f3f4f6; --tr-proj: #ffffff; --tr-add: #e5e7eb; --input-bg: #ffffff;
        }
        
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; transition: background-color 0.2s, color 0.2s; }
        
        #login-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: var(--card); padding: 40px; border-radius: 12px; border: 1px solid var(--border); width: 320px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 12px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; box-sizing: border-box; outline: none; }
        .login-box button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }

        #main-content { display: none; padding: 20px; width: 100%; box-sizing: border-box; }
        .header-title { font-size: 28px; font-weight: 800; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .toolbar { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; background: var(--card); padding: 16px; border-radius: 12px; border: 1px solid var(--border); flex-wrap: wrap; }
        button, select { background-color: var(--input-bg); color: var(--text); border: 1px solid var(--border); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }

        .chart-container { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; height: 300px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; text-align: center; }

        .scroll-container { width: 100%; overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); background: var(--card); position: relative; scroll-behavior: smooth; }
        table { border-collapse: collapse; min-width: 4500px; table-layout: fixed; }
        th, td { border: 1px solid var(--border); text-align: center; width: 65px; height: 45px; position: relative; }
        
        .name-col { position: sticky; left: 0; background: var(--card) !important; z-index: 20; width: 280px !important; text-align: left !important; padding: 0 15px; border-right: 2px solid var(--border); box-sizing: border-box; }
        
        .name-content { display: flex; flex-direction: column; justify-content: center; width: 100%; }
        .name-row-top { display: flex; align-items: center; gap: 8px; width: 100%; }
        .name-sub { font-size: 10px; color: var(--text-dim); margin-left: 18px; margin-top: 2px; font-weight: normal; }
        
        .edit-btn { background: transparent; border: none; color: var(--text-dim); font-size: 11px; padding: 5px; cursor: pointer; margin-left: auto; opacity: 0.3; }
        .edit-btn:hover { opacity: 1; color: var(--accent); }
        
        .current-week { border-left: 2px solid var(--accent) !important; border-right: 2px solid var(--accent) !important; background: rgba(59, 130, 246, 0.05); }
        .header-year { background: var(--th-year); font-size: 14px; font-weight: 900; height: 35px; }
        .header-month { background: var(--th-month); font-size: 12px; font-weight: bold; height: 30px; color: var(--accent); text-transform: uppercase; }
        .header-week { background: var(--th-week); font-size: 10px; color: var(--text-dim); height: 30px; }
        
        .row-summary { cursor: pointer; background: var(--tr-sum); font-weight: 600; }
        .row-project { background: var(--tr-proj); font-size: 12px; }
        .row-total { background: var(--th-year); font-weight: 800; border-top: 2px solid var(--accent); }

        input.cell-input { width: 100%; height: 100%; background: transparent; border: none; color: inherit; text-align: center; font-weight: bold; outline: none; }
        .cell-locked { color: var(--text-dim); font-style: italic; font-size: 11px; cursor: not-allowed; }
        .cell-unsure { background-color: var(--unsure) !important; color: #111827; }

        .remove-proj-btn { opacity: 0; color: var(--danger); background: transparent; border: none; cursor: pointer; font-size: 18px; margin-left: auto; }
        .row-project:hover .remove-proj-btn { opacity: 1; }
        .nc-tag { color: var(--accent); font-weight: bold; }
        .uf-tag { color: var(--text-dim); opacity: 0.6; }

        .modal-overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 12px; width: 400px; border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; }
        .modal-content input[type="text"], .modal-content input[type="email"], .modal-content select { width: 100%; padding: 12px; margin-bottom: 10px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; box-sizing: border-box; }
        
        .archive-checkbox { margin-top: 10px; margin-bottom: 15px; font-size: 13px; color: var(--text-dim); display: flex; align-items: center; gap: 8px; }
        .theme-btn { background: transparent; border: 1px solid var(--border); font-size: 16px; padding: 6px 12px; cursor: pointer; border-radius: 6px; color: var(--text); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin-bottom: 20px;">Studio 5</h2>
            <input type="email" id="email" placeholder="E-post">
            <input type="password" id="password" placeholder="Passord">
            <button onclick="handleLogin()">Logg inn</button>
            <p id="login-error" style="color:var(--danger); font-size:12px; margin-top:15px;"></p>
        </div>
    </div>

    <div id="main-content">
        <div class="header-title">
            <span style="display: flex; align-items: center; gap: 10px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="flat" stroke-linejoin="flat">
                    <polyline points="18 15 12 9 6 15"></polyline>
                </svg>
                Prognose
            </span>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button onclick="toggleTheme()" class="theme-btn" title="Bytt lyst/mørkt tema">☀️/🌙</button>
                <button onclick="changePassword()" style="background:var(--border); border:none; color:var(--text); font-size:12px; padding:8px 15px;">Bytt passord</button>
                <button onclick="handleLogout()" style="background:var(--danger); color:white; border:none; font-size:12px; padding:8px 15px;">Logg ut</button>
            </div>
        </div>

        <div class="toolbar">
            <select id="viewFilter" onchange="renderUI()">
                <option value="ansatte">Vis: Ansatte</option>
                <option value="ledig">Vis: Ledig kapasitet</option>
                <option value="prosjekter">Vis: Prosjekter</option>
            </select>
            <select id="avdelingFilter" onchange="updateFilterDropdowns(false); renderUI()"><option value="Alle">Alle Avdelinger</option></select>
            <select id="klyngeFilter" onchange="renderUI()"><option value="Alle">Alle Klynger</option></select>
            
            <button onclick="openNewProjectModal()" style="background:var(--accent); color:white; border:none; font-weight:600;">+ Nytt Prosjekt</button>

            <div id="admin-tools" style="display:none; gap:5px; margin-left:5px;">
                <button onclick="openNewEmployeeModal()" style="background:var(--accent); color:white; border:none; font-weight:600;">+ Ny Ansatt</button>
                <div style="display: flex; gap: 5px; border-left: 1px solid var(--border); padding-left: 12px; margin-left: 5px;">
                    <button onclick="exportToExcel()" style="background:#059669; color:white; border:none;">Excel Eksport</button>
                    <button onclick="document.getElementById('importFile').click()" style="background:#15803d; color:white; border:none;">Excel Import</button>
                    <input type="file" id="importFile" style="display:none" onchange="importFromExcel(event)" accept=".xlsx">
                </div>
            </div>

            <div id="saveStatus" style="margin-left: auto; color: #4ade80; font-size: 12px;"></div>
        </div>

        <div id="chartSection" class="chart-container"><canvas id="utilizationChart"></canvas></div>

        <div id="statsSection" class="stats-grid" style="display:none;">
            <div class="stat-card"><div id="statNordicCount" style="font-size:22px; font-weight:800;">0</div><div style="font-size:11px; color:var(--text-dim);">NORDIC PROSJEKTER</div></div>
            <div class="stat-card"><div id="statNC" style="font-size:22px; font-weight:800;">0</div><div style="font-size:11px; color:var(--text-dim);">NC PROSJEKTER</div></div>
            <div class="stat-card"><div id="statPercNC" style="font-size:22px; font-weight:800;">0%</div><div style="font-size:11px; color:var(--text-dim);">% NC</div></div>
        </div>

        <div class="scroll-container" id="mainTableContainer">
            <table><thead id="tableHead"></thead><tbody id="tableBody"></tbody><tfoot id="tableFoot"></tfoot></table>
        </div>
    </div>

    <div id="projectModal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modalTitle">Prosjekt</h3>
            <input type="hidden" id="editProjId">
            <input type="text" id="projNo" placeholder="Prosjektnummer (valgfritt)">
            <input type="text" id="projName" placeholder="Navn på prosjekt...">
            <div style="display:flex; gap:15px; margin-bottom:10px; font-size:13px;">
                <label><input type="radio" name="projType" value="nordic" checked> Nordic</label>
                <label><input type="radio" name="projType" value="nc"> NC</label>
                <label><input type="radio" name="projType" value="uf"> Ufakt.</label>
            </div>
            
            <div id="archiveSection" style="display:none;">
                <label class="archive-checkbox">
                    <input type="checkbox" id="projArkivert"> Arkivert (skjules fra tildeling)
                </label>
            </div>

            <button onclick="saveProject()" style="width:100%; background:var(--accent); color:white; border:none; padding:12px; border-radius:6px; font-weight:600;">Lagre</button>
            <button id="deleteBtn" style="width:100%; margin-top:5px; background:var(--danger); color:white; border:none; padding:12px; border-radius:6px;" onclick="deleteProject()">Slett</button>
            
            <div id="mergeSection" style="display:none; padding: 15px; background: var(--input-bg); border-radius: 6px; margin-top: 15px; border: 1px solid var(--danger);">
                <p style="font-size:12px; margin-top:0; color:var(--text-dim);">Slå dette sammen inn i et annet prosjekt:</p>
                <select id="mergeTargetProject" style="margin-bottom: 5px;"></select>
                <button onclick="executeMerge()" style="width:100%; background:#991b1b; color:white; border:none; padding:8px; border-radius:6px; font-size:12px;">Slå sammen & slett dette</button>
            </div>

            <button onclick="closeModals()" style="width:100%; margin-top:5px; background:transparent; border:1px solid var(--border); padding:10px; border-radius:6px; color:var(--text);">Avbryt</button>

    <div id="assignModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Tildel prosjekt</h3>
            <input type="text" id="projectSearch" placeholder="Søk etter prosjekt..." oninput="filterProjects()">
            <div id="projectList" style="max-height:300px; overflow-y:auto; margin-top:10px;"></div>
            <button onclick="closeModals()" style="width:100%; margin-top:10px; background:transparent; border:1px solid var(--border); padding:10px; border-radius:6px; color:var(--text);">Avbryt</button>
        </div>
    </div>
    
    <div id="employeeModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Rediger Ansatt</h3>
            <input type="hidden" id="editEmpId">
            <input type="text" id="editEmpName" placeholder="Navn på ansatt">
            <input type="text" id="editEmpAvdeling" placeholder="Avdeling (valgfritt)">
            <input type="text" id="editEmpKlynge" placeholder="Klynge (valgfritt)">
            <input type="email" id="editEmpEmail" placeholder="E-post for innlogging (valgfritt)">
            <select id="editEmpRole" style="margin-bottom: 15px;">
                <option value="ansatt">Vanlig Ansatt</option>
                <option value="admin">Administrator</option>
            </select>
            <button onclick="saveEmployee()" style="width:100%; background:var(--accent); color:white; border:none; padding:12px; border-radius:6px; font-weight:600;">Lagre</button>
            <button onclick="closeModals()" style="width:100%; margin-top:5px; background:transparent; border:1px solid var(--border); padding:10px; border-radius:6px; color:var(--text);">Avbryt</button>
        </div>
    </div>

    <script>
        // =============================================================
        // KONFIGURASJON & THEME
        // =============================================================
        if(localStorage.getItem('theme') === 'light') document.documentElement.classList.add('light-mode');
        
        function toggleTheme() {
            document.documentElement.classList.toggle('light-mode');
            const isLight = document.documentElement.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            if(chartInstance) updateChart(); // Oppdaterer fargene på grafen
        }

        const supabaseUrl = 'https://gtebkasmqdvqhwesqkcq.supabase.co';
        const supabaseKey = 'sb_publishable_fh-IwZS8DpRwwU_ETq7yZg_QvezjZe5';
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        let data = { employees: [], projects: [], assignments: [], timeline: [] };
        let expanded = new Set();
        let nyligLagtTil = new Set(); 
        let chartInstance = null;
        let activeAssigneeId = null; 
        let currentWeekId = "";
        
        let currentUserEmail = "";
        let currentUserId = "";
        let currentUserRole = "ansatt";

        function esc(str) {
            return String(str ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // AUTH
        async function checkUser() {
            const { data: { session } } = await db.auth.getSession();
            if (session) { 
                currentUserEmail = session.user.email;
                document.getElementById('login-screen').style.display = 'none'; 
                document.getElementById('main-content').style.display = 'block'; 
                init(); 
            }
            else { document.getElementById('login-screen').style.display = 'flex'; }
        }
        async function handleLogin() {
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const { error } = await db.auth.signInWithPassword({ email, password });
            if (error) document.getElementById('login-error').innerText = "Feil e-post eller passord."; else location.reload();
        }
        async function handleLogout() { await db.auth.signOut(); location.reload(); }
        async function changePassword() {
            const ny = prompt("Nytt passord (minst 6 tegn):");
            if (ny && ny.length >= 6) { const { error } = await db.auth.updateUser({ password: ny }); alert(error ? error.message : "Oppdatert!"); }
        }

        // TIDSREGNING & FERIER
        const monthNames = ["jan", "feb", "mar", "apr", "mai", "jun", "jul", "aug", "sep", "okt", "nov", "des"];

        function getHolidays(year) {
            const a = year % 19, b = Math.floor(year / 100), c = year % 100;
            const h = (19 * a + b - Math.floor(b / 4) - Math.floor((b - Math.floor((b + 8) / 25) + 1) / 3) + 15) % 30;
            const l = (32 + 2 * (b % 4) + 2 * Math.floor(c / 4) - h - (c % 4)) % 7;
            const m = Math.floor((a + 11 * h + 22 * l) / 451);
            const pMonth = Math.floor((h + l - 7 * m + 114) / 31) - 1; 
            const pDay = ((h + l - 7 * m + 114) % 31) + 1;
            const easterDate = new Date(year, pMonth, pDay - 3, 12, 0, 0);
            const easterWeek = getISOWeekInfo(easterDate).week;

            return { 8: "Vinterferie", [easterWeek]: "Påskeferie", 28: "Sommer", 29: "Sommer", 30: "Sommer", 31: "Sommer", 40: "Høstferie", 52: "Juleferie" };
        }

        function getISOWeekInfo(date) {
            const d = new Date(date.getFullYear(), date.getMonth(), date.getDate(), 12, 0, 0);
            const day = d.getDay() || 7;
            d.setDate(d.getDate() + 4 - day); 
            const year = d.getFullYear();
            const month = d.getMonth();
            const startOfYear = new Date(year, 0, 1, 12, 0, 0);
            const week = Math.ceil((((d - startOfYear) / 86400000) + 1) / 7);
            return { week, year, month }; 
        }

        function buildTimeline() {
            const now = new Date();
            now.setHours(12, 0, 0, 0);
            
            const currentDay = now.getDay() || 7;
            const currentMonday = new Date(now.getFullYear(), now.getMonth(), now.getDate() - currentDay + 1, 12, 0, 0);
            const startMonday = new Date(currentMonday.getFullYear(), currentMonday.getMonth(), currentMonday.getDate() - (12 * 7), 12, 0, 0);

            const currentInfo = getISOWeekInfo(now);
            currentWeekId = `u${currentInfo.week}/${currentInfo.year.toString().slice(-2)}`;

            data.timeline = []; 
            for (let i = 0; i < 64; i++) {
                const d = new Date(startMonday.getFullYear(), startMonday.getMonth(), startMonday.getDate() + (i * 7), 12, 0, 0);
                const info = getISOWeekInfo(d);
                const id = `u${info.week}/${info.year.toString().slice(-2)}`;
                data.timeline.push({ id: id, week: info.week, month: monthNames[info.month], year: info.year, isPast: d < currentMonday && id !== currentWeekId });
            }
        }

        function scrollToCurrentWeek() {
            const container = document.getElementById('mainTableContainer');
            const currentWeekEl = document.querySelector(`th[data-week-id="${currentWeekId}"]`);
            if (container && currentWeekEl) {
                const scrollPos = currentWeekEl.offsetLeft - 280;
                container.scrollTo({ left: Math.max(0, scrollPos), behavior: 'smooth' });
            }
        }

        async function init() { 
            buildTimeline(); 
            await fetchData(); 
            
            const avdFilter = document.getElementById('avdelingFilter');
            const avdelinger = [...new Set(data.employees.map(e => e.avdeling).filter(Boolean))].sort();
            avdFilter.innerHTML = '<option value="Alle">Alle Avdelinger</option>' + avdelinger.map(a => `<option value="${esc(a)}">${esc(a)}</option>`).join('');

            const meg = data.employees.find(e => e.email && e.email.toLowerCase() === currentUserEmail.toLowerCase());
            if (meg) {
                currentUserId = meg.id;
                currentUserRole = meg.rolle || 'ansatt';
                if (meg.avdeling) avdFilter.value = meg.avdeling;
            }

            document.getElementById('admin-tools').style.display = currentUserRole === 'admin' ? 'flex' : 'none';
            updateFilterDropdowns(false); 

            if (meg && meg.gruppe) document.getElementById('klyngeFilter').value = meg.gruppe;

            initListeners();
            renderUI(); 
            setTimeout(scrollToCurrentWeek, 500);
        }

        async function fetchData() { 
            const [emp, proj] = await Promise.all([
                db.from('ansatte').select('*').order('navn'), 
                db.from('prosjekter').select('*').order('navn')
            ]);
            data.employees = emp.data || []; 
            data.projects = proj.data || [];

            let allAssignments = [];
            let from = 0;
            const pageSize = 1000;
            while (true) {
                const { data: rows, error } = await db.from('bemanning').select('*').range(from, from + pageSize - 1);
                if (error || !rows || rows.length === 0) break;
                allAssignments = allAssignments.concat(rows);
                if (rows.length < pageSize) break;
                from += pageSize;
            }
            data.assignments = allAssignments;
        }

        function updateFilterDropdowns(resetAvdelinger = true) {
            const avdFilter = document.getElementById('avdelingFilter');
            const klyFilter = document.getElementById('klyngeFilter');
            const currentAvd = avdFilter.value;
            const currentKly = klyFilter.value;

            if (resetAvdelinger) {
                const avdelinger = [...new Set(data.employees.map(e => e.avdeling).filter(Boolean))].sort();
                avdFilter.innerHTML = '<option value="Alle">Alle Avdelinger</option>' + avdelinger.map(a => `<option value="${esc(a)}">${esc(a)}</option>`).join('');
                avdFilter.value = currentAvd || 'Alle';
            }

            const activeAvd = avdFilter.value;
            const relevantEmployees = activeAvd === 'Alle' ? data.employees : data.employees.filter(e => e.avdeling === activeAvd);
            const klynger = [...new Set(relevantEmployees.map(e => e.gruppe).filter(Boolean))].sort();
            
            klyFilter.innerHTML = '<option value="Alle">Alle Klynger</option>' + klynger.map(k => `<option value="${esc(k)}">${esc(k)}</option>`).join('');
            if (klynger.includes(currentKly)) klyFilter.value = currentKly;
            else klyFilter.value = 'Alle';
        }

        function getFilteredEmployees() {
            const aF = document.getElementById('avdelingFilter').value;
            const kF = document.getElementById('klyngeFilter').value;
            return data.employees.filter(e => (aF === 'Alle' || e.avdeling === aF) && (kF === 'Alle' || e.gruppe === kF));
        }

        function getCellColor(v) {
            if (!v || v === 0) return "transparent";
            if (v > 100) return "rgba(239, 68, 68, 0.35)"; 
            if (v >= 90) return "rgba(34, 197, 94, 0.35)"; 
            return `rgba(234, 179, 8, ${Math.max(0.15, (v / 90) * 0.35)})`;
        }

        function getLedigColor(v) {
            if (v <= 0) return "rgba(34, 197, 94, 0.35)"; 
            if (v <= 50) return "rgba(234, 179, 8, 0.35)"; 
            return "rgba(239, 68, 68, 0.35)"; 
        }

        // EXCEL EKSPORT & IMPORT MED ID
        async function exportToExcel() {
            const { data: rows, error } = await db.from('bemanning').select('*').limit(100000);
            if (error) return alert("Feil: " + error.message);

            const wb = XLSX.utils.book_new();
            const wsBackup = XLSX.utils.json_to_sheet(rows);
            XLSX.utils.book_append_sheet(wb, wsBackup, "Backup");

            const uker = data.timeline.map(t => t.id);
            const map = {};
            
            rows.forEach(r => {
                const key = `${r.ansatt_id}||${r.prosjekt_id}`;
                if (!map[key]) {
                    const emp = data.employees.find(e => e.id === r.ansatt_id) || { navn: 'Ukjent', avdeling: '', gruppe: '' };
                    const proj = data.projects.find(p => p.id === r.prosjekt_id) || { navn: 'Ukjent' };
                    map[key] = { avdeling: emp.avdeling, klynge: emp.gruppe, ansattNavn: emp.navn, prosjektNavn: proj.navn };
                }
                map[key][r.uke] = r.er_usikker ? (r.prosent + 'u') : r.prosent;
            });

            const header = ['Avdeling', 'Klynge', 'Ansatt', 'Prosjekt', ...uker];
            const pivotRows = [header];

            const sorted = Object.values(map).sort((a, b) => a.ansattNavn.localeCompare(b.ansattNavn, 'no') || a.prosjektNavn.localeCompare(b.prosjektNavn, 'no'));

            let lastAnsatt = null;
            sorted.forEach(r => {
                if (lastAnsatt && lastAnsatt !== r.ansattNavn) pivotRows.push(new Array(header.length).fill(''));
                lastAnsatt = r.ansattNavn;
                const row = [r.avdeling, r.klynge, r.ansattNavn, r.prosjektNavn, ...uker.map(u => r[u] ?? '')];
                pivotRows.push(row);
            });

            const sumRows = [];
            const ansatte = [...new Set(sorted.map(r => r.ansattNavn))];
            ansatte.forEach(ansatt => {
                const prosjekter = sorted.filter(r => r.ansattNavn === ansatt);
                const sumRow = ['', '', ansatt, 'TOTAL', ...uker.map(u => prosjekter.reduce((sum, r) => sum + (parseFloat(String(r[u] ?? '').replace('u', '')) || 0), 0) || '')];
                sumRows.push(sumRow);
            });

            const finalRows = [header];
            ansatte.forEach(ansatt => {
                const blokk = pivotRows.filter(r => r[2] === ansatt);
                finalRows.push(...blokk);
                const sum = sumRows.find(r => r[2] === ansatt);
                if (sum) finalRows.push(sum);
                finalRows.push(new Array(header.length).fill(''));
            });

            const wsPivot = XLSX.utils.aoa_to_sheet(finalRows);
            wsPivot['!cols'] = [{ wch: 15 }, { wch: 15 }, { wch: 20 }, { wch: 40 }, ...uker.map(() => ({ wch: 7 }))];

            XLSX.utils.book_append_sheet(wb, wsPivot, "Prognose");
            XLSX.writeFile(wb, `Studio5_${new Date().toLocaleDateString('no-NO')}.xlsx`);
        }

        async function importFromExcel(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const arr = new Uint8Array(e.target.result);
                const wb = XLSX.read(arr, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                document.getElementById('saveStatus').innerText = "Importerer...";
                
                const mappedData = [];
                for(let row of json) {
                    if(row.ansatt_id && row.prosjekt_id) { mappedData.push(row); continue; } 
                    const eDb = data.employees.find(x => x.navn === row.Ansatt);
                    const pDb = data.projects.find(x => x.navn === row.Prosjekt);
                    if(eDb && pDb) {
                        for(let key in row) {
                            if(key.startsWith('u')) {
                                const val = String(row[key]);
                                mappedData.push({
                                    id: `${eDb.id}_${pDb.id}_${key}`,
                                    ansatt_id: eDb.id, prosjekt_id: pDb.id, uke: key,
                                    prosent: parseFloat(val.replace('u','')) || 0,
                                    er_usikker: val.includes('u')
                                });
                            }
                        }
                    }
                }

                const chunkSize = 1000;
                let hasError = false; let errMsg = "";
                for (let i = 0; i < mappedData.length; i += chunkSize) {
                    const chunk = mappedData.slice(i, i + chunkSize);
                    const { error } = await db.from('bemanning').upsert(chunk);
                    if (error) { hasError = true; errMsg = error.message; break; }
                }

                if (hasError) { alert("Importfeil: " + errMsg); document.getElementById('saveStatus').innerText = "Feilet"; } 
                else { alert("Import fullført!"); location.reload(); }
            };
            reader.readAsArrayBuffer(file);
        }

        async function save(ansattId, prosjektId, uke, inVal, silent = false) {
            const isUnsure = inVal.toLowerCase().endsWith('u');
            const val = parseFloat(inVal.replace('u', '')) || 0;
            const id = `${ansattId}_${prosjektId}_${uke}`;

            const { error } = await db.from('bemanning').upsert({ id: id, ansatt_id: ansattId, prosjekt_id: prosjektId, uke: uke, prosent: val, er_usikker: isUnsure }, { onConflict: 'id' }).select('id');

            if (!error) {
                const ex = data.assignments.find(a => a.id === id);
                if (ex) { ex.prosent = val; ex.er_usikker = isUnsure; } 
                else data.assignments.push({ id, ansatt_id: ansattId, prosjekt_id: prosjektId, uke, prosent: val, er_usikker: isUnsure });
                
                if (!silent) {
                    document.getElementById('saveStatus').innerText = "Lagret";
                    setTimeout(() => document.getElementById('saveStatus').innerText = "", 800);
                    renderTotaler(); updateChart(); updateStats();
                }
            } else { alert("Feil ved lagring. Prøv å laste siden på nytt (F5)."); }
        }

        async function fillMonth(ansattId, prosjektId, ukeId, value) {
            const currentIdx = data.timeline.findIndex(t => t.id === ukeId);
            const currentMonth = data.timeline[currentIdx].month;
            document.getElementById('saveStatus').innerText = "Lagrer måned...";
            const promises = [];
            for (let i = currentIdx; i < data.timeline.length; i++) {
                if (data.timeline[i].month !== currentMonth) break;
                if (!data.timeline[i].isPast || data.timeline[i].id === currentWeekId) promises.push(save(ansattId, prosjektId, data.timeline[i].id, value, true));
            }
            await Promise.all(promises);
            document.getElementById('saveStatus').innerText = "Lagret";
            setTimeout(() => document.getElementById('saveStatus').innerText = "", 800);
            renderUI();
        }

        function initListeners() {

            container.addEventListener('click', async (e) => {
                const btn = e.target.closest('button[data-action]');
                if (!btn) return;
                e.stopPropagation();
                const action = btn.dataset.action;

                if (action === 'edit-emp') openEditEmployeeModal(btn.dataset.empId, btn.dataset.empNavn, btn.dataset.empAvd, btn.dataset.empKly, btn.dataset.empEpost, btn.dataset.empRole);
                else if (action === 'edit-proj') openEditProjectModal(btn.dataset.projId, btn.dataset.projNr, btn.dataset.projNavn, btn.dataset.projNc === 'true', btn.dataset.projUf === 'true', btn.dataset.projArk === 'true');
                else if (action === 'remove-proj') await removeProjectFromEmployee(btn.dataset.ansattId, btn.dataset.prosjektId);
                else if (action === 'add-proj') openAssignModal(btn.dataset.ansattId);
            });

            container.addEventListener('change', async (e) => {
                const inp = e.target.closest('input[data-action="cell-input"]');
                if (!inp) return;
                await save(inp.dataset.ansattId, inp.dataset.prosjektId, inp.dataset.uke, inp.value);
            });

            container.addEventListener('dblclick', async (e) => {
                const inp = e.target.closest('input[data-action="cell-input"]');
                if (!inp) return;
                await fillMonth(inp.dataset.ansattId, inp.dataset.prosjektId, inp.dataset.uke, inp.value);
            });
        }

        function renderTotaler() {
            const view = document.getElementById('viewFilter').value;
            const foot = document.getElementById('tableFoot');
            if (view === 'prosjekter') { foot.innerHTML = ''; return; }
            
            const fEmps = getFilteredEmployees();
            let h = `<tr class="row-total"><td class="name-col">${view === 'ledig' ? 'SNITT LEDIG' : 'TOTAL UTNYTTELSE'}</td>`;
            data.timeline.forEach(t => {
                let total = 0; fEmps.forEach(e => { total += data.assignments.filter(a => a.ansatt_id === e.id && a.uke === t.id).reduce((s, a) => s + Number(a.prosent), 0); });
                const avg = Math.round(total / (fEmps.length || 1));
                if (view === 'ledig') { const l = 100 - avg; h += `<td style="background-color:${getLedigColor(l)}; color:${l<0?'#f87171':(l===0?'transparent':'inherit')}">${l === 0 ? '' : l + '%'}</td>`; }
                else h += `<td style="background-color:${getCellColor(avg)}; color:${avg>0?'inherit':'transparent'}">${avg}%</td>`;
            });

        function updateChart() {
            const view = document.getElementById('viewFilter').value;
            const fEmps = getFilteredEmployees();
            const n = fEmps.length || 1;
            const isLight = document.documentElement.classList.contains('light-mode');
            const tickColor = isLight ? '#6b7280' : '#a1a1aa';
            
            const currentIdx = data.timeline.findIndex(t => t.id === currentWeekId);
            const startIdx = Math.max(0, currentIdx - 1); 
            const chartTimeline = data.timeline.slice(startIdx);
            
            const datasets = [];
            const labels = chartTimeline.map(t => 'U'+t.week);
            const totalUtil = chartTimeline.map(t => { let s = 0; fEmps.forEach(e => { s += data.assignments.filter(a => a.ansatt_id === e.id && a.uke === t.id && !a.er_usikker).reduce((sum, a) => sum + Number(a.prosent), 0); }); return Math.round(s/n); });
            const unsureUtil = chartTimeline.map(t => { let s = 0; fEmps.forEach(e => { s += data.assignments.filter(a => a.ansatt_id === e.id && a.uke === t.id).reduce((sum, a) => sum + Number(a.prosent), 0); }); return Math.round(s/n); });

            if (view === 'ledig') {
                datasets.push({ label: 'Garantert ledig', data: totalUtil.map(v => 100 - v), borderColor: '#3b82f6', fill: false, tension: 0.3 });
                datasets.push({ label: 'Ledig (inkl. usikre)', data: unsureUtil.map(v => 100 - v), borderColor: '#fbbf24', borderDash: [2, 2], fill: false, tension: 0.3 });
            } else {
                const faktUtil = chartTimeline.map(t => { let s = 0; fEmps.forEach(e => { s += data.assignments.filter(a => { const p = data.projects.find(x => x.id === a.prosjekt_id); return a.ansatt_id === e.id && a.uke === t.id && p && !p.er_ufakturerbart && !a.er_usikker; }).reduce((sum, a) => sum + Number(a.prosent), 0); }); return Math.round(s/n); });
                datasets.push({ label: 'Sikker Total', data: totalUtil, borderColor: '#3b82f6', fill: false, tension: 0.3 });
                datasets.push({ label: 'Fakturerbar', data: faktUtil, borderColor: isLight ? '#1f2937' : '#fff', borderDash: [5, 5], fill: false, tension: 0.3 });
                datasets.push({ label: 'Inkl. Usikker', data: unsureUtil, borderColor: '#fbbf24', borderDash: [2, 2], fill: false, tension: 0.3 });
            }

            const annotations = {};
            chartTimeline.forEach((t, i) => {
                const ferierDetteAret = getHolidays(t.year);
                if (ferierDetteAret[t.week]) {
                    annotations[`ferie_${t.id}`] = { type: 'box', xMin: i - 0.5, xMax: i + 0.5, backgroundColor: 'rgba(34, 197, 94, 0.1)', borderWidth: 0, label: { display: true, content: ferierDetteAret[t.week], position: 'center', rotation: -90, color: isLight ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.3)', font: { size: 11, weight: 'bold' } } };
                }
                if (t.id === currentWeekId) {
                    annotations['currentWeek'] = { type: 'line', xMin: i, xMax: i, borderColor: '#3b82f6', borderWidth: 2, borderDash: [5, 5], label: { display: true, content: '', position: 'start', backgroundColor: '#3b82f6', color: '#fff', font: { size: 10, weight: 'bold' }, yAdjust: 5 } };
                }
            });

            const ctx = document.getElementById('utilizationChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, { type: 'line', data: { labels, datasets }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: view === 'ledig' ? 100 : 120, ticks: { color: tickColor } }, x: { ticks: { color: tickColor } } }, plugins: { annotation: { annotations }, legend: { labels: { color: tickColor } } } } });
        }

        function updateStats() {
            const fakt = data.projects.filter(p => !p.er_ufakturerbart && !p.arkivert);
            const nc = fakt.filter(p => p.er_nc);
            document.getElementById('statNordicCount').innerText = fakt.length - nc.length;

            document.getElementById('projectModal').style.display="flex"; 
        }
        
        function openEditEmployeeModal(id, navn, avdeling, klynge, epost, rolle) { 
            document.getElementById('editEmpId').value = id; document.getElementById('editEmpName').value = navn; document.getElementById('editEmpAvdeling').value = avdeling && avdeling !== 'undefined' ? avdeling : ''; document.getElementById('editEmpKlynge').value = klynge && klynge !== 'undefined' ? klynge : ''; document.getElementById('editEmpEmail').value = epost && epost !== 'undefined' ? epost : ''; document.getElementById('editEmpRole').value = rolle && rolle !== 'undefined' ? rolle : 'ansatt'; document.getElementById('employeeModal').style.display='flex'; 
        }

        function openNewEmployeeModal() {
            document.getElementById('editEmpId').value = ""; document.getElementById('editEmpName').value = ""; document.getElementById('editEmpAvdeling').value = ""; document.getElementById('editEmpKlynge').value = ""; document.getElementById('editEmpEmail').value = ""; document.getElementById('editEmpRole').value = "ansatt"; document.getElementById('employeeModal').style.display='flex';
        }
        
        async function saveProject() { 
            const id = document.getElementById('editProjId').value; const nr = document.getElementById('projNo').value.trim(); const navn = document.getElementById('projName').value.trim(); const type = document.querySelector('input[name="projType"]:checked').value; const arkivert = document.getElementById('projArkivert').checked;
            if(!navn) return; 

            if (id) { await db.from('prosjekter').update({prosjektnummer:nr, navn:navn, er_nc:type==='nc', er_ufakturerbart:type==='uf', arkivert:arkivert}).eq('id', id); } 
            else {
                const checkNavn = navn.toLowerCase().replace(/\s+/g, '');
                const lignende = data.projects.find(p => (nr && p.prosjektnummer === nr) || p.navn.toLowerCase().replace(/\s+/g, '') === checkNavn);
                if (lignende && !confirm(`Advarsel: Lignende navn ("${lignende.navn}") finnes. Fortsett?`)) return; 
                await db.from('prosjekter').insert([{prosjektnummer:nr, navn:navn, er_nc:type==='nc', er_ufakturerbart:type==='uf', arkivert:arkivert}]); 
            }
            await fetchData(); renderUI(); closeModals(); 
        }

        async function executeMerge() {
            const oldId = document.getElementById('editProjId').value; const newId = document.getElementById('mergeTargetProject').value;
            if (!newId) return alert("Velg et prosjekt.");
            if (!confirm("Sikker? Sletter dette og flytter timer til valgt prosjekt. Kan ikke angres.")) return;
            
            document.getElementById('saveStatus').innerText = "Slår sammen...";
            const toUpsert = [];
            data.assignments.filter(a => a.prosjekt_id === oldId).forEach(oldA => {
                const existing = data.assignments.filter(a => a.prosjekt_id === newId).find(nA => nA.ansatt_id === oldA.ansatt_id && nA.uke === oldA.uke);
                if (existing) toUpsert.push({ ...existing, prosent: existing.prosent + oldA.prosent, er_usikker: existing.er_usikker || oldA.er_usikker });
                else toUpsert.push({ ...oldA, prosjekt_id: newId, id: `${oldA.ansatt_id}_${newId}_${oldA.uke}` });
            });

            if (toUpsert.length > 0) {
                for (let i = 0; i < toUpsert.length; i += 1000) await db.from('bemanning').upsert(toUpsert.slice(i, i + 1000));
                await db.from('bemanning').delete().eq('prosjekt_id', oldId);
            }
            await db.from('prosjekter').delete().eq('id', oldId);
            
            document.getElementById('saveStatus').innerText = "Ferdig!"; setTimeout(() => document.getElementById('saveStatus').innerText = "", 1500);
            await fetchData(); renderUI(); closeModals(); 
        }

        async function deleteProject() { if(confirm("Slette prosjektet?")) { await db.from('prosjekter').delete().eq('id', document.getElementById('editProjId').value); await fetchData(); renderUI(); closeModals(); } }
        
        async function saveEmployee() { 
            const id = document.getElementById('editEmpId').value; const navn = document.getElementById('editEmpName').value.trim(); const avdeling = document.getElementById('editEmpAvdeling').value.trim(); const klynge = document.getElementById('editEmpKlynge').value.trim(); const epost = document.getElementById('editEmpEmail').value.trim().toLowerCase(); const rolle = document.getElementById('editEmpRole').value;
            if (!navn) return;

            if (id) await db.from('ansatte').update({navn: navn, avdeling: avdeling, gruppe: klynge, email: epost, rolle: rolle}).eq('id', id); 
            else {
                if (data.employees.find(e => e.navn.toLowerCase() === navn.toLowerCase())) return alert("Finnes allerede!");
                await db.from('ansatte').insert([{navn: navn, avdeling: avdeling, gruppe: klynge, email: epost, rolle: rolle}]);
            }
            await fetchData(); updateFilterDropdowns(); renderUI(); closeModals(); 
        }

        async function removeProjectFromEmployee(ansattId, prosjektId) { if(confirm("Fjerne fra ansatt?")) { await db.from('bemanning').delete().eq('ansatt_id', ansattId).eq('prosjekt_id', prosjektId); await fetchData(); renderUI(); } }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display='none'); }
        
        function filterProjects() { 
            const s = document.getElementById('projectSearch').value.toLowerCase();
            const l = document.getElementById('projectList'); l.innerHTML=''; 
            data.projects.filter(p => p.navn.toLowerCase().includes(s) && !p.arkivert).forEach(p => { 
                const d=document.createElement('div'); d.style.padding="10px"; d.style.cursor="pointer"; d.textContent = p.navn;  
                d.onclick=async()=>{ nyligLagtTil.add(`${activeAssigneeId}_${p.id}`); await save(activeAssigneeId, p.id, currentWeekId, '0'); closeModals(); renderUI(); setTimeout(scrollToCurrentWeek, 100); }; 
                l.appendChild(d); 
            }); 
        }

        checkUser();
    </script>
</body>
</html>

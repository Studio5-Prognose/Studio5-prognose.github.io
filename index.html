<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio 5 Prognose</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #ffffff; --text: #1a1a1a; --border: #e0e0e0;
            --accent: #0078d4; --hover: #f5f5f5; --unsure: #fff4ce;
        }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; background: var(--bg); color: var(--text); }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid var(--border); padding: 8px; text-align: center; min-width: 45px; }
        th { background: var(--hover); position: sticky; top: 0; }
        .name-col { text-align: left; min-width: 150px; font-weight: bold; background: white; position: sticky; left: 0; }
        input { width: 100%; border: none; text-align: center; background: transparent; font-size: 13px; outline: none; }
        input:focus { background: var(--hover); }
        .unsure { background-color: var(--unsure) !important; }
        .project-row { background: #fafafa; }
        .emp-row { background: #eee; cursor: pointer; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 10% auto; padding: 20px; width: 300px; border-radius: 8px; }
        #saveStatus { position: fixed; top: 10px; right: 10px; padding: 5px 10px; background: #dff6dd; display: none; }
    </style>
</head>
<body>

    <div id="saveStatus">Lagrer...</div>
    <h2>Bemanningsprognose</h2>
    
    <div id="tableContainer">Laster data...</div>

    <div id="assignModal" class="modal">
        <div class="modal-content">
            <h3>Tildel prosjekt</h3>
            <input type="text" id="projSearch" placeholder="Søk prosjekt..." style="border:1px solid #ccc; padding:5px; margin-bottom:10px;">
            <div id="projList" style="max-height: 300px; overflow-y: auto;"></div>
            <button onclick="closeModal()" style="margin-top:10px;">Avbryt</button>
        </div>
    </div>

    <script>
        // --- KONFIGURASJON ---
        const SUPABASE_URL = 'https://DIN-URL.supabase.co';
        const SUPABASE_KEY = 'DIN-ANON-KEY';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let data = { employees: [], projects: [], assignments: [] };
        let activeEmp = null;
        let expanded = new Set();

        // Finn ukenummer
        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            var weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            return `u${weekNo}/${String(d.getUTCFullYear()).slice(-2)}`;
        }

        const weeks = [];
        let curr = new Date();
        curr.setDate(curr.getDate() - (7 * 4)); // Start 4 uker tilbake
        for(let i=0; i<24; i++) {
            weeks.push(getWeekNumber(new Date(curr)));
            curr.setDate(curr.getDate() + 7);
        }

        async function init() {
            await fetchData();
            renderUI();
        }

        async function fetchData() {
            const [e, p, a] = await Promise.all([
                db.from('ansatte').select('*').order('navn'),
                db.from('prosjekter').select('*').order('navn'),
                db.from('bemanning').select('*')
            ]);
            data.employees = e.data || [];
            data.projects = p.data || [];
            data.assignments = a.data || [];
        }

        function renderUI() {
            let html = `<table><thead><tr><th class="name-col">Navn / Prosjekt</th>`;
            weeks.forEach(w => html += `<th>${w}</th>`);
            html += `</tr></thead><tbody>`;

            data.employees.forEach(emp => {
                html += `<tr class="emp-row" onclick="toggleEmp('${emp.navn}')">
                    <td class="name-col">${expanded.has(emp.navn) ? '▼' : '▶'} ${emp.navn}</td>
                    ${weeks.map(w => `<td></td>`).join('')}
                </tr>`;

                if (expanded.has(emp.navn)) {
                    const empAss = data.assignments.filter(a => a.ansatt === emp.navn);
                    const empProjs = [...new Set(empAss.map(a => a.prosjekt))];

                    empProjs.forEach(proj => {
                        html += `<tr class="project-row">
                            <td class="name-col" style="padding-left:25px;">${proj}</td>
                            ${weeks.map(w => {
                                const val = empAss.find(a => a.prosjekt === proj && a.uke === w);
                                const displayVal = val ? (val.prosent + (val.er_usikker ? 'u' : '')) : '';
                                const cls = val && val.er_usikker ? 'unsure' : '';
                                return `<td><input class="${cls}" value="${displayVal}" onchange="save('${emp.navn}','${proj}','${w}', this.value)"></td>`;
                            }).join('')}
                        </tr>`;
                    });

                    html += `<tr><td colspan="${weeks.length+1}"><button onclick="openModal('${emp.navn}', event)">+ Tildel prosjekt</button></td></tr>`;
                }
            });

            html += `</tbody></table>`;
            document.getElementById('tableContainer').innerHTML = html;
        }

        function toggleEmp(name) {
            if (expanded.has(name)) expanded.delete(name);
            else expanded.add(name);
            renderUI();
        }

        async function save(ansatt, prosjekt, uke, inVal) {
            const status = document.getElementById('saveStatus');
            status.style.display = 'block';

            const isU = String(inVal).toLowerCase().endsWith('u');
            const val = parseFloat(String(inVal).replace('u', '')) || 0;
            // Viktig: Rens ID for spesialtegn som skråstrek
            const cleanId = `${ansatt}_${prosjekt.replace(/\//g, '-')}_${uke}`;

            const { error } = await db.from('bemanning').upsert({
                id: cleanId,
                ansatt: ansatt,
                prosjekt: prosjekt,
                uke: uke,
                prosent: val,
                er_usikker: isU
            }, { onConflict: 'id' }).select('id'); // .select('id') fikser unknown content type

            status.style.display = 'none';
            if (error) alert("Feil ved lagring: " + error.message);
            else {
                await fetchData();
                renderUI();
            }
        }

        function openModal(name, e) {
            e.stopPropagation();
            activeEmp = name;
            document.getElementById('assignModal').style.display = 'block';
            renderProjList('');
        }

        function closeModal() {
            document.getElementById('assignModal').style.display = 'none';
        }

        function renderProjList(search) {
            const list = document.getElementById('projList');
            list.innerHTML = '';
            data.projects
                .filter(p => p.navn.toLowerCase().includes(search.toLowerCase()))
                .forEach(p => {
                    const div = document.createElement('div');
                    div.style.padding = '8px';
                    div.style.cursor = 'pointer';
                    div.style.borderBottom = '1px solid #eee';
                    div.innerText = p.navn;
                    div.onclick = async () => {
                        // Vi oppretter en tom rad (0%) for å tvinge frem prosjektet i lista
                        await save(activeEmp, p.navn, weeks[4], '0'); 
                        closeModal();
                    };
                    list.appendChild(div);
                });
        }

        document.getElementById('projSearch').oninput = (e) => renderProjList(e.target.value);

        init();
    </script>
</body>
</html>
